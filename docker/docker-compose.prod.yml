version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: booking_postgres
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secretpassword
      POSTGRES_DB: ticket_booking_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: booking_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: booking_rabbitmq
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: adminpassword
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  server:
    build:
      context: ../server
      dockerfile: Dockerfile
    container_name: booking_backend
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - postgres
      - redis
      - rabbitmq
    environment:
      - DB_HOST=postgres 
      - DB_PORT=5432
      - DB_USERNAME=admin
      - DB_PASSWORD=secretpassword
      - DB_NAME=ticket_booking_db
      - JWT_SECRET=mot_chuoi_bi_mat_rat_dai_va_kho_doan_cho_booking_system
      - JWT_EXPIRATION=1d
      - NODE_ENV=production

  client:
    build:
      context: ../client
      dockerfile: Dockerfile
    container_name: booking_frontend
    restart: always
    ports:
      - "4200:4200"
    depends_on:
      - server
    environment:
      - NEXT_PUBLIC_API_URL=http://server:3000

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data: